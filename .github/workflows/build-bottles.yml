name: Build Base Bottles

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  metadata:
    name: Read formula metadata
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.formula.outputs.version }}
      release_tag: ${{ steps.formula.outputs.release_tag }}
      root_url: ${{ steps.formula.outputs.root_url }}
    steps:
      - name: Check out tap
        uses: actions/checkout@v4

      - name: Read Base formula version
        id: formula
        shell: bash
        run: |
          version="$(awk -F'"' '/^[[:space:]]*version "/ { print $2; exit }' Formula/base.rb)"
          if [[ -z "$version" ]]; then
            url_version="$(sed -nE 's|^[[:space:]]*url ".*refs/tags/v([^"/]+)\.tar\.gz".*$|\1|p' Formula/base.rb | head -n 1)"
            version="$url_version"
          fi

          if [[ -z "$version" ]]; then
            echo "::error::Unable to read Formula/base.rb version from version line or URL"
            exit 1
          fi

          release_tag="base-v${version}"
          root_url="https://github.com/${GITHUB_REPOSITORY}/releases/download/${release_tag}"

          {
            echo "version=${version}"
            echo "release_tag=${release_tag}"
            echo "root_url=${root_url}"
          } >> "$GITHUB_OUTPUT"

  build:
    name: Build bottle on ${{ matrix.runner }}
    needs: metadata
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15-intel
            artifact: intel
          - runner: macos-15
            artifact: arm64
    env:
      HOMEBREW_GITHUB_API_TOKEN: ${{ github.token }}
      HOMEBREW_NO_INSTALL_CLEANUP: 1
    steps:
      - name: Check out tap
        uses: actions/checkout@v4

      - name: Tap local checkout
        shell: bash
        run: |
          brew untap basefoundry/base >/dev/null 2>&1 || true
          brew tap basefoundry/base "$GITHUB_WORKSPACE"

      - name: Build base-bash-libs bottle
        shell: bash
        run: brew install --build-bottle basefoundry/base/base-bash-libs

      - name: Smoke-test base-bash-libs bottle build
        shell: bash
        run: |
          bash_path="$(brew --prefix bash)/bin/bash"
          libs_prefix="$(brew --prefix basefoundry/base/base-bash-libs)"
          output="$(
            "$bash_path" -c '
              source "$1/libexec/lib/bash/std/lib_std.sh"
              import "$1/libexec/lib/bash/file/lib_file.sh"
              printf "%s\n" "$(type -t run)" "$(type -t update_file_section)"
            ' _ "$libs_prefix"
          )"
          [[ "$output" == $'function\nfunction' ]]

      - name: Build Base bottle
        shell: bash
        run: brew install --build-bottle basefoundry/base/base

      - name: Smoke-test Base bottle build
        shell: bash
        run: |
          basectl_path="$(brew --prefix basefoundry/base/base)/bin/basectl"
          "$basectl_path" --version

      - name: Generate bottle JSON
        shell: bash
        run: |
          brew bottle --json --root-url "${{ needs.metadata.outputs.root_url }}" basefoundry/base/base-bash-libs
          brew bottle --json --root-url "${{ needs.metadata.outputs.root_url }}" basefoundry/base/base

          ruby <<'RUBY'
          require "fileutils"
          require "json"

          Dir["*.bottle*.json"].each do |json_path|
            JSON.parse(File.read(json_path)).each_value do |formula|
              formula.fetch("bottle").fetch("tags").each_value do |tag|
                remote_filename = tag.fetch("filename")
                local_filename = tag.fetch("local_filename")

                next if local_filename == remote_filename
                next unless File.exist?(local_filename)

                FileUtils.mv(local_filename, remote_filename)
              end
            end
          end
          RUBY

          mkdir -p bottle-output
          generated=()
          for path in *.bottle*.tar.gz *.bottle*.json; do
            [[ -e "$path" ]] || continue
            generated+=("$path")
          done

          if [[ ${#generated[@]} -eq 0 ]]; then
            echo "::error::brew bottle did not produce bottle artifacts"
            exit 1
          fi

          mv "${generated[@]}" bottle-output/

      - name: Upload bottle workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: base-bottle-${{ matrix.artifact }}
          path: bottle-output/
          if-no-files-found: error

  publish:
    name: Publish bottle assets and update formula
    needs:
      - metadata
      - build
    runs-on: macos-15
    env:
      GH_TOKEN: ${{ github.token }}
      HOMEBREW_GITHUB_API_TOKEN: ${{ github.token }}
    steps:
      - name: Refuse direct master updates
        if: ${{ github.ref_name == 'master' }}
        shell: bash
        run: |
          echo "::error::Run this workflow from a tap release branch, not master."
          exit 1

      - name: Check out tap branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Download bottle artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: base-bottle-*
          path: bottles
          merge-multiple: true

      - name: Tap local checkout
        shell: bash
        run: |
          brew untap basefoundry/base >/dev/null 2>&1 || true
          brew tap basefoundry/base "$GITHUB_WORKSPACE"

      - name: Create tap bottle release
        shell: bash
        run: |
          if gh release view "${{ needs.metadata.outputs.release_tag }}" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            exit 0
          fi

          gh release create "${{ needs.metadata.outputs.release_tag }}" \
            --repo "$GITHUB_REPOSITORY" \
            --title "Base Homebrew bottles ${{ needs.metadata.outputs.version }}" \
            --notes "Homebrew bottle artifacts for Base ${{ needs.metadata.outputs.version }}."

      - name: Upload bottle assets
        shell: bash
        run: |
          bottle_files=()
          while IFS= read -r path; do
            bottle_files+=("$path")
          done < <(find bottles -name '*.bottle.*' -type f | sort)

          if [[ ${#bottle_files[@]} -eq 0 ]]; then
            echo "::error::No bottle tarballs were downloaded"
            exit 1
          fi

          gh release upload "${{ needs.metadata.outputs.release_tag }}" \
            "${bottle_files[@]}" \
            --repo "$GITHUB_REPOSITORY" \
            --clobber

      - name: Merge bottle JSON into formula
        shell: bash
        run: |
          json_files=()
          while IFS= read -r path; do
            json_files+=("$path")
          done < <(find bottles -name '*.json' -type f | sort)

          if [[ ${#json_files[@]} -eq 0 ]]; then
            echo "::error::No bottle JSON files were downloaded"
            exit 1
          fi

          brew bottle --merge --write --no-commit "${json_files[@]}"

          tap_path="$(brew --repo basefoundry/base)"
          cp "$tap_path/Formula/base.rb" Formula/base.rb
          cp "$tap_path/Formula/base-bash-libs.rb" Formula/base-bash-libs.rb

      - name: Commit bottle stanza
        shell: bash
        run: |
          if git diff --quiet -- Formula/base.rb Formula/base-bash-libs.rb; then
            echo "Formula/base.rb already contains the current bottle stanza."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/base.rb Formula/base-bash-libs.rb
          git commit -m "Add Base ${{ needs.metadata.outputs.version }} Homebrew bottles"
          git push origin "HEAD:${GITHUB_REF_NAME}"
